<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Passport — Check In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body class="login-body">

  <div class="passport-stage">
    <div class="boarding-pass">
      <div class="bp-left">
        <p class="bp-eyebrow">LANGUAGE PASSPORT</p>
        <h1 class="bp-title">Check in for<br>your quiz</h1>
        <p class="bp-sub">Three gates. Three languages.<br>Thai · Chinese · English.</p>

        <form id="loginForm" class="bp-form" novalidate>
          <label class="bp-field">
            <span>Passenger name</span>
            <input type="text" id="name" name="name" placeholder="e.g. Aiko Tanaka" autocomplete="name" required />
          </label>
          <label class="bp-field">
            <span>Email</span>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" required />
          </label>
          <p class="bp-error" id="formError" role="alert"></p>
          <button type="submit" class="bp-button" id="submitBtn">
            <span>Issue boarding pass</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
            </svg>
          </button>
        </form>
      </div>

      <div class="bp-stub">
        <div class="bp-stub-inner">
          <p class="bp-stub-label">GATE</p>
          <p class="bp-stub-value">QZ‑01</p>
          <div class="bp-stub-divider"></div>
          <p class="bp-stub-label">FLIGHTS</p>
          <p class="bp-stub-flags">🇹🇭 🇨🇳 🇬🇧</p>
          <div class="bp-barcode" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>

</html>
