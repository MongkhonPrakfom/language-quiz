<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Passport — Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Noto+Sans+Thai:wght@500;700&family=Noto+Sans+SC:wght@500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body class="quiz-body">

  <header class="topbar">
    <div class="topbar-id">
      <span class="topbar-eyebrow">PASSENGER</span>
      <span class="topbar-name" id="passengerName">—</span>
    </div>
    <div class="stamps" id="stampRow">
      <div class="stamp" data-lang="th">🇹🇭</div>
      <div class="stamp" data-lang="zh">🇨🇳</div>
      <div class="stamp" data-lang="en">🇬🇧</div>
    </div>
    <button class="exit-btn" id="exitBtn" title="Exit / Keluar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M15 4H8a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7M18 15l3-3-3-3M21 12H9" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      <span>Exit</span>
    </button>
  </header>

  <main class="stage">

    <!-- GATE SELECT -->
    <section id="gateSelect" class="panel gate-select">
      <p class="section-eyebrow">CHOOSE YOUR GATE</p>
      <h1 class="section-title">Which language today?</h1>
      <div class="gate-grid" id="gateGrid"><!-- filled by JS --></div>
    </section>

    <!-- QUIZ -->
    <section id="quizPanel" class="panel quiz-panel hidden">
      <div class="quiz-head">
        <p class="section-eyebrow" id="quizEyebrow">GATE</p>
        <div class="progress-track" id="progressTrack"></div>
      </div>
      <h2 class="quiz-question" id="quizQuestion"></h2>
      <div class="options" id="quizOptions"></div>
      <div class="quiz-nav">
        <button class="ghost-btn" id="backGate">← Back to gates</button>
        <span class="quiz-count" id="quizCount"></span>
      </div>
    </section>

    <!-- RESULTS -->
    <section id="resultsPanel" class="panel results-panel hidden">
      <p class="section-eyebrow">BOARDING COMPLETE</p>
      <h1 class="section-title" id="resultsTitle">Your score</h1>
      <div class="score-ring-wrap">
        <svg class="score-ring" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="60" class="ring-bg" />
          <circle cx="70" cy="70" r="60" class="ring-fg" id="ringFg" />
        </svg>
        <div class="score-ring-label">
          <span id="scoreValue">0</span>
          <span class="score-total" id="scoreTotal">/0</span>
        </div>
      </div>
      <div class="results-list" id="resultsList"></div>
      <div class="results-actions">
        <button class="bp-button" id="tryAnother">
          <span>Stamp another passport</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </section>

  </main>

  <div class="exit-overlay hidden" id="exitOverlay">
    <div class="exit-modal">
      <p class="section-eyebrow">LEAVING SO SOON?</p>
      <h2 class="exit-title">Exit the quiz?</h2>
      <p class="exit-copy">Your progress on this gate will not be saved. You'll be signed out and returned to check‑in.
      </p>
      <div class="exit-actions">
        <button class="ghost-btn" id="exitCancel">Stay</button>
        <button class="bp-button exit-confirm" id="exitConfirm">
          <span>Exit</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M15 4H8a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7M18 15l3-3-3-3M21 12H9" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="quiz.js"></script>
</body>

</html>
